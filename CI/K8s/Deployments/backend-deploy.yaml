apiVersion:  apps/v1 
kind: Deployment
metadata:
  name: back-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: back
  template:
    metadata:
      name: api 
      labels:
        tier: back

    spec:
      containers:
        - name: backend
          image: shebl22/backend:915e45d1b58d07bb54a2d4847451ad6451c9ff4e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cm-back
            - secretRef:
                name: back-creds
                
